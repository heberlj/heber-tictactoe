<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Dashboard</title>
    <link rel="stylesheet" href="main.css">
    <link rel="stylesheet" href="dashboard.css">
</head>

<body>
    <main id="game-board-screen" class="screen">

        <!-- ENCABEZADO -->
        <div class="header-controls">
            <a href="selectmode.html" id="btn-back" class="icon-btn btn-orange">
                <img src="assets/icons/atras.png" alt="Back">
            </a>

            <div class="vs-indicator">
                <div class="player-badge playerbadgep1 ">
                    <div class="avatar-container">
                        <div class="avatarname avatar1name">P1</div>
                        <span class="badge-icon mini-x ">✕</span>
                    </div>
                    <span class="playername player1name">Player 1</span>
                </div>
                <div class="vs-text">VS</div>
                <div class="player-badge playerbadgep2">
                    <div class="avatar-container">
                        <div class="avatarname avatar2name avatarname-disable">P2</div>
                        <span class="badge-icon mini-o">◯</span>
                    </div>
                    <span class="playername player2name">Player 2</span>
                </div>
            </div>

            <button id="btn-reset-board" class="icon-btn btn-blue">
                <img src="assets/icons/reset.png" alt="Reiniciar tablero">
            </button>
        </div>


        <!-- TABLERO -->
        <div class="game-card">

            <div class="inner-scoreboard">
                <div class="stat-box">
                    <span class="stat-name statname1">JE</span>
                    <span class="stat-value stat-ganadasP1">0 GANADAS</span>
                </div>
                <div class="stat-box">
                    <span class="stat-name statname2">CPU</span>
                    <span class="stat-value stat-ganadasP2">0 GANADAS</span>
                </div>
                <div class="stat-box">
                    <span class="balance-icon"><img src="assets/icons/lawyer.png" alt="Icono de empate"></span>
                    <span class="stat-value stat-empates">0 EMPATES</span>
                </div>
            </div>

            <!-- DIV DONDE ESTA LA MAGIA -->
            <div class="board-grid">

                <div class="game-cell" data-index="0">
                    <img class="x" src="assets/icons/icon-x-s.png" alt="">
                    <img class="o" src="assets/icons/icon-o-s.png" alt="">
                </div>

                <div class="game-cell" data-index="1">
                    <img class="x" src="assets/icons/icon-x-s.png" alt="">
                    <img class="o" src="assets/icons/icon-o-s.png" alt="">
                </div>
                <div class="game-cell" data-index="2">
                    <img class="x" src="assets/icons/icon-x-s.png" alt="">
                    <img class="o" src="assets/icons/icon-o-s.png" alt="">
                </div>
                <div class="game-cell" data-index="3">
                    <img class="x" src="assets/icons/icon-x-s.png" alt="">
                    <img class="o" src="assets/icons/icon-o-s.png" alt="">
                </div>
                <div class="game-cell" data-index="4">
                    <img class="x" src="assets/icons/icon-x-s.png" alt="">
                    <img class="o" src="assets/icons/icon-o-s.png" alt="">
                </div>
                <div class="game-cell" data-index="5">
                    <img class="x" src="assets/icons/icon-x-s.png" alt="">
                    <img class="o" src="assets/icons/icon-o-s.png" alt="">
                </div>
                <div class="game-cell" data-index="6">
                    <img class="x" src="assets/icons/icon-x-s.png" alt="">
                    <img class="o" src="assets/icons/icon-o-s.png" alt="">
                </div>
                <div class="game-cell" data-index="7">
                    <img class="x" src="assets/icons/icon-x-s.png" alt="">
                    <img class="o" src="assets/icons/icon-o-s.png" alt="">
                </div>
                <div class="game-cell" data-index="8">
                    <img class="x" src="assets/icons/icon-x-s.png" alt="">
                    <img class="o" src="assets/icons/icon-o-s.png" alt="">
                </div>
            </div>
        </div>
    </main>

    <!-- Pantalla de Ganador -->
    <div class="popup-container resultado-container-ganador hidden">
        <div class="popup-content">
            <img class="trofeo" src="assets/icons/trofeo.png" alt="">
            <div class="victoria">VICTORIA</div>
            <div class="nombre-pj">JOSE EMILIO</div>
            <div class="stats">
                <div class="stat-box">
                    <span class="stat-name statname1">JE</span>
                    <span class="stat-value stat-ganadasP1">0 GANADAS</span>
                </div>
                <div class="stat-box">
                    <span class="stat-name statname2">CPU</span>
                    <span class="stat-value stat-ganadasP2">0 GANADAS</span>
                </div>
                <div class="stat-box">
                    <span class="balance-icon"><img src="assets/icons/lawyer.png" alt="Icono de empate"></span>
                    <span class="stat-value stat-empates">0 EMPATES</span>
                </div>
            </div>
            <div class="btn-container">
                <button id="btn-reiniciar-victoria" class="btn btn-play-again btn-blue">Proxima ronda</button>
                <button id="btn-salir-victoria" class="btn btn-salir btn-orange">Salir</button>
            </div>
        </div>
    </div>

    <!-- Pantalla de Perdedor -->
    <div class="popup-container resultado-container-perdedor hidden ">
        <div class="popup-content">
            <img class="loser" src="assets/icons/loser.png" alt="">
            <div class="victoria">PERDISTE</div>
            <div class="nombre-pj">JOSE EMILIO</div>
            <div class="stats">
                <div class="stat-box">
                    <span class="stat-name statname1">JE</span>
                    <span class="stat-value stat-ganadasP1">0 GANADAS</span>
                </div>
                <div class="stat-box">
                    <span class="stat-name statname2">CPU</span>
                    <span class="stat-value stat-ganadasP2">0 GANADAS</span>
                </div>
                <div class="stat-box">
                    <span class="balance-icon"><img src="assets/icons/lawyer.png" alt="Icono de empate"></span>
                    <span class="stat-value stat-empates">0 EMPATES</span>
                </div>
            </div>
            <div class="btn-container">
                <button class="btn btn-play-again btn-blue">Proxima ronda</button>
                <button class="btn btn-salir btn-orange">Salir</button>
            </div>
        </div>
    </div>

    <!-- Pantalla de Salida -->
    <div class="popup-container salida-container hidden">
        <div class="popup-content">
            <div class="salir-text">¿Seguro que desea reiniciar la partida?</div>
            <div class="btn-container">
                <button class="btn btn-reiniciar btn-blue">REINICIAR PARTIDA</button>
                <button class="btn btn-cancelar btn-orange">CANCELAR</button>
            </div>
        </div>
    </div>

    <!-- Pantalla de Empate -->
    <div class="popup-container empate-container hidden">
        <div class="popup-content">
            <div class="empate-text">EMPATE</div>
            <div class="btn-container">
                <button id="btn-cerrar-empate" class="btn btn-cancelar  btn-orange">CERRAR</button>
            </div>
        </div>
    </div>

    <script src="dashboard.js"></script>
</body>

</html>
