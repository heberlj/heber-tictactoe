<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Tic Tac Toe</title>
    <link rel="stylesheet" href="styles.css">
</head>
<body>

    <main id="menu-screen" class="screen">
        <h2 class="title">Tic Tac Toe</h2>
        <button id="btn-pvc" class="btn btn-blue">Jugador vs CPU</button>
        <button id="btn-pvp" class="btn btn-orange">Jugador vs Jugador</button>
    </main>

    <main id="game-screen" class="screen hidden">
        <header class="scoreboard">
            <div class="score-box">Jugador X: <span id="score-x">0</span></div>
            <div class="score-box">Empates: <span id="score-ties">0</span></div>
            <div class="score-box">Jugador O: <span id="score-o">0</span></div>
        </header>

        <div class="grid-board">
            <div class="cell" data-index="0"></div>
            <div class="cell" data-index="1"></div>
            <div class="cell" data-index="2"></div>
            <div class="cell" data-index="3"></div>
            <div class="cell" data-index="4"></div>
            <div class="cell" data-index="5"></div>
            <div class="cell" data-index="6"></div>
            <div class="cell" data-index="7"></div>
            <div class="cell" data-index="8"></div>
        </div>

        <button id="btn-restart">Reiniciar Juego</button>
    </main>

    <script src="index.js"></script>
</body>
</html>
